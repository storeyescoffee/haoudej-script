[mysql]
host = 127.0.0.1
port = 3306
user = root
password = 12345
database = CHANGE_ME

[query]
tva = 10
# Column used for date filtering and ordering (date_creation or date_update, etc.)
date_col = date_creation
output = /var/lib/haoudej/results.csv

[schedule]
# Daily run time HH:MM.
# Evening times (>=12:00) export today; overnight (<12:00) export yesterday.
time = 23:30

[api]
url = http://app.storeyes.io:9000/process
api_key =
field = file
timeout = 120
# device_id: leave blank to auto-derive from the Pi serial number.
device_id =

[mqtt]
host = mqtt.storeyes.io
port = 1883
keepalive = 60
user = storeyes
password = 12345
qos = 1
retain = false
timeout = 5
retries = 5

[status]
# Seconds between MQTT status heartbeats.
heartbeat = 300
